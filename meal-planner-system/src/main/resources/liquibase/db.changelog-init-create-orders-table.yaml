databaseChangeLog:
  - changeSet:
      id: create-orders-table
      author: feex
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_orders_user_id
                    references: users(id)
              - column:
                  name: total_amount
                  type: decimal(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: stripe_session_id
                  type: varchar(255)
              - column:
                  name: np_city_ref
                  type: varchar(255)
              - column:
                  name: np_warehouse_ref
                  type: varchar(255)
              - column:
                  name: tracking_number
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: create-order-items-table
      author: feex
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: bigserial
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_order_id
                    references: orders(id)
                    deleteCascade: true
              - column:
                  name: ingredient_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_items_ingredient_id
                    references: ingredients(id)
              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: price_at_purchase
                  type: decimal(10, 2)
                  constraints:
                    nullable: false
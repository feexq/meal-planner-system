databaseChangeLog:
  - changeSet:
      id: drop-recipe-translation-foreign-key
      author: feex
      changes:
        - dropForeignKeyConstraint:
            baseTableName: recipe_translations
            constraintName: fk_recipe_translation_origin
  
  - changeSet:
      id: add-recipe-translation-foreign-key-cascade
      author: feex
      changes:
        - addForeignKeyConstraint:
            baseTableName: recipe_translations
            baseColumnNames: recipe_id
            referencedTableName: recipes
            referencedColumnNames: id
            constraintName: fk_recipe_translation_origin
            onDelete: CASCADE

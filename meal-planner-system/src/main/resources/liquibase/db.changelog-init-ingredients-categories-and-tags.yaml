  - changeSet:
      id: assign-categories-to-ingredients
      author: feex
      runOnChange: false
      changes:
        - sql:
            sql: |
              -- ── Vegetables ──────────────────────────────────────────────────
              UPDATE ingredients SET category_id = (SELECT id FROM categories WHERE slug='vegetables')
              WHERE normalized_name IN (
                'acorn squash','alfalfa','alfalfa sprout','artichoke','arugula',
                'asparagus','beet','beet green','bok choy','broccoli','brussels sprout',
                'butternut squash','cabbage','carrot','cauliflower','celery','chard',
                'chive','collard green','corn','cucumber','daikon','eggplant',
                'endive','escarole','fennel','garlic','ginger','green bean',
                'green onion','jalapeño','kale','kohlrabi','leek','lettuce',
                'mustard green','okra','onion','parsnip','pea','pepper',
                'potato','pumpkin','radicchio','radish','rhubarb','scallion',
                'shallot','snow pea','spinach','squash','string bean','sweet potato',
                'swiss chard','tomatillo','tomato','turnip','watercress','yellow squash',
                'yam','zucchini','avocado','bell pepper','red onion','yellow onion',
                'yellow pepper','red pepper','green pepper','purple cabbage',
                'napa cabbage','savoy cabbage','red cabbage','white onion',
                'cherry tomato','grape tomato','roma tomato','sun-dried tomato',
                'yucca root','taro root','jicama','water chestnut','bamboo shoot',
                'hearts of palm','artichoke heart','roasted red pepper','canned tomato',
                'whole tomato','diced tomato','crushed tomato','tomato paste',
                'tomato purée','tomato sauce','tomato juice','green tomato',
                'yellow tomato','yellow cherry tomato','yellow pear tomato'
              );

              -- ── Fruits ──────────────────────────────────────────────────────
              UPDATE ingredients SET category_id = (SELECT id FROM categories WHERE slug='fruits')
              WHERE normalized_name IN (
                'apple','apricot','banana','blackberry','blueberry','cantaloupe',
                'cherry','clementine','coconut','cranberry','date','fig',
                'grape','grapefruit','guava','honeydew','kiwi','lemon',
                'lime','lychee','mango','nectarine','orange','papaya',
                'passion fruit','peach','pear','pineapple','plum','pomegranate',
                'raspberry','strawberry','tangerine','watermelon','yuzu juice',
                'dried cranberry','dried apricot','dried fig','dried mango',
                'dried cherry','raisin','prune','currant','gooseberry',
                'elderberry','boysenberry','açaí','plantain','quince',
                'blood orange','mandarin','clementine','persimmon','star fruit',
                'dragon fruit','jackfruit','durian','tamarind','loquat',
                'alphonso mango','anjou pear','wild blueberry'
              );

              -- ── Mushrooms ────────────────────────────────────────────────────
              UPDATE ingredients SET category_id = (SELECT id FROM categories WHERE slug='mushrooms')
              WHERE normalized_name IN (
                'mushroom','shiitake mushroom','portobello mushroom',
                'cremini mushroom','button mushroom','oyster mushroom',
                'chanterelle','morel','porcini','enoki mushroom',
                'wild mushroom','dried mushroom','truffle'
              );

              -- ── Beef ────────────────────────────────────────────────────────
              UPDATE ingredients SET category_id = (SELECT id FROM categories WHERE slug='beef')
              WHERE normalized_name IN (
                'beef','ground beef','beef chuck','beef brisket','beef rib',
                'beef tenderloin','beef sirloin','flank steak','ribeye',
                'beef roast','beef stew meat','beef short rib','beef liver',
                'beef broth','beef stock','beef shank','oxtail','veal'
              );

              -- ── Pork ────────────────────────────────────────────────────────
              UPDATE ingredients SET category_id = (SELECT id FROM categories WHERE slug='pork')
              WHERE normalized_name IN (
                'pork','bacon','ham','pork chop','pork loin','pork shoulder',
                'pork belly','pork rib','pork roast','prosciutto','pancetta',
                'pork sausage','pork tenderloin','pork broth','pork stock',
                'pork ground','salami','pepperoni','chorizo','lard',
                'pork rind','canadian bacon','apple-smoked bacon'
              );

              -- ── Chicken ─────────────────────────────────────────────────────
              UPDATE ingredients SET category_id = (SELECT id FROM categories WHERE slug='chicken')
              WHERE normalized_name IN (
                'chicken','chicken breast','chicken thigh','chicken leg',
                'chicken wing','whole chicken','chicken drumstick','rotisserie chicken',
                'chicken broth','chicken stock','ground chicken','chicken liver',
                'roasting chicken','chicken fillet','chicken tender'
              );

              -- ── Turkey & Other Poultry ───────────────────────────────────────
              UPDATE ingredients SET category_id = (SELECT id FROM categories WHERE slug='turkey-other-poultry')
              WHERE normalized_name IN (
                'turkey','ground turkey','turkey breast','turkey bacon',
                'turkey sausage','duck','duck breast','goose','quail',
                'cornish hen','pheasant','whole turkey'
              );

              -- ── Lamb & Veal ─────────────────────────────────────────────────
              UPDATE ingredients SET category_id = (SELECT id FROM categories WHERE slug='lamb-veal')
              WHERE normalized_name IN (
                'lamb','lamb chop','lamb rack','ground lamb','lamb shank',
                'lamb shoulder','leg of lamb','lamb broth'
              );

              -- ── Sausages & Deli ──────────────────────────────────────────────
              UPDATE ingredients SET category_id = (SELECT id FROM categories WHERE slug='sausages-deli')
              WHERE normalized_name IN (
                'andouille sausage','bratwurst','hot dog','kielbasa',
                'italian sausage','breakfast sausage','deli meat','bologna',
                'corned beef','pastrami','mortadella'
              );

              -- ── Fish ────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────
  # 7. Seed: базове призначення тегів (dietary)
  # ─────────────────────────────────────────────
  - changeSet:
      id: assign-base-tags-to-ingredients
      author: feex
      runOnChange: false
      changes:
        - sql:
            sql: |
              -- vegan: всі овочі, фрукти, гриби, бобові, горіхи, зернові
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'vegan'
                AND i.category_id IN (
                  SELECT id FROM categories
                  WHERE slug IN ('vegetables','fruits','mushrooms','beans-lentils',
                                 'nuts-seeds','fresh-herbs','dried-spices','spice-blends',
                                 'rice-grains','cereals-oats','sugar-sweeteners',
                                 'cooking-oils-vinegar','extracts-flavoring',
                                 'baking-additives','dairy-alternatives')
                )
              ON CONFLICT DO NOTHING;

              -- vegetarian: vegan + молочка + яйця
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'vegetarian'
                AND i.category_id IN (
                  SELECT id FROM categories
                  WHERE slug IN ('vegetables','fruits','mushrooms','beans-lentils',
                                 'nuts-seeds','fresh-herbs','dried-spices','spice-blends',
                                 'rice-grains','cereals-oats','dairy-eggs','cheese',
                                 'milk-cream','butter-margarine','yogurt-sour-cream','eggs',
                                 'sugar-sweeteners','cooking-oils-vinegar','extracts-flavoring',
                                 'baking-additives','dairy-alternatives')
                )
              ON CONFLICT DO NOTHING;

              -- gluten-free: М'ясо, риба, овочі, фрукти, молочка, горіхи
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'gluten-free'
                AND i.category_id IN (
                  SELECT id FROM categories
                  WHERE slug IN ('vegetables','fruits','mushrooms','meat-poultry',
                                 'fish-seafood','dairy-eggs','cheese','milk-cream',
                                 'butter-margarine','yogurt-sour-cream','eggs',
                                 'beans-lentils','nuts-seeds','rice-grains',
                                 'fresh-herbs','dried-spices','cooking-oils-vinegar')
                )
              ON CONFLICT DO NOTHING;

              -- contains-gluten: борошно, хліб, паста, злаки
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'contains-gluten'
                AND i.category_id IN (
                  SELECT id FROM categories
                  WHERE slug IN ('flour','pasta-noodles','bread-bakery','cereals-oats')
                )
              ON CONFLICT DO NOTHING;

              -- contains-dairy: молочка
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'contains-dairy'
                AND i.category_id IN (
                  SELECT id FROM categories
                  WHERE slug IN ('cheese','milk-cream','butter-margarine','yogurt-sour-cream')
                )
              ON CONFLICT DO NOTHING;

              -- dairy-free: все крім молочки
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'dairy-free'
                AND i.category_id NOT IN (
                  SELECT id FROM categories
                  WHERE slug IN ('cheese','milk-cream','butter-margarine','yogurt-sour-cream')
                )
                AND i.category_id IS NOT NULL
              ON CONFLICT DO NOTHING;

              -- contains-nuts: горіхи та насіння
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'contains-nuts'
                AND i.category_id = (SELECT id FROM categories WHERE slug = 'nuts-seeds')
              ON CONFLICT DO NOTHING;

              -- contains-alcohol: алкогольні напої
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'contains-alcohol'
                AND i.category_id IN (
                  SELECT id FROM categories
                  WHERE slug IN ('wine-beer','spirits-liqueurs')
                )
              ON CONFLICT DO NOTHING;

              -- high-protein: м'ясо, риба, яйця, бобові
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'high-protein'
                AND i.category_id IN (
                  SELECT id FROM categories
                  WHERE slug IN ('beef','pork','chicken','turkey-other-poultry',
                                 'lamb-veal','sausages-deli','fish','shellfish-crustaceans',
                                 'eggs','beans-lentils')
                )
              ON CONFLICT DO NOTHING;

              -- keto: м'ясо, риба, яйця, горіхи, молочка, олії
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'keto'
                AND i.category_id IN (
                  SELECT id FROM categories
                  WHERE slug IN ('beef','pork','chicken','turkey-other-poultry',
                                 'lamb-veal','fish','shellfish-crustaceans',
                                 'eggs','nuts-seeds','cheese','butter-margarine',
                                 'cooking-oils-vinegar','fresh-herbs','dried-spices')
                )
              ON CONFLICT DO NOTHING;

              -- spicy: перець, гострі спеції
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'spicy'
                AND i.normalized_name IN (
                  'cayenne pepper','red pepper flake','jalapeño','habanero',
                  'serrano pepper','ancho chile','chipotle powder','sriracha',
                  'hot sauce','tabasco','gochujang','sambal oelek','harissa',
                  'chili powder','arbol chili powder','ancho chile powder',
                  'anaheim chili','ancho chili','red chili'
                )
              ON CONFLICT DO NOTHING;

              -- raw: свіжі некулінарні
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'raw'
                AND i.category_id IN (
                  SELECT id FROM categories
                  WHERE slug IN ('vegetables','fruits','fresh-herbs')
                )
              ON CONFLICT DO NOTHING;

              -- fermented
              INSERT INTO ingredient_tags (ingredient_id, tag_id)
              SELECT i.id, t.id FROM ingredients i
              CROSS JOIN ing_tags t
              WHERE t.slug = 'fermented'
                AND i.normalized_name IN (
                  'sauerkraut','kimchi','miso paste','miso','kefir',
                  'yogurt','yoghurt','tempeh','vinegar','wine-cured sauerkraut',
                  'sourdough bread','active starter'
                )
              ON CONFLICT DO NOTHING;

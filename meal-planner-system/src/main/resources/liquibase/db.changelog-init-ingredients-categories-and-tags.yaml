databaseChangeLog:
  - changeSet:
      id: create-tags-table
      author: feex
      changes:
        - createTable:
            tableName: ing_tags
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: slug
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: color
                  type: VARCHAR(7)
                  remarks: "HEX color, e.g. #6C3FC5"

        - createIndex:
            tableName: ing_tags
            indexName: idx_tags_slug
            columns:
              - column:
                  name: slug

      rollback:
        - dropTable:
            tableName: ing_tags

  - changeSet:
      id: create-ingredient-tags-table
      author: feex
      changes:
        - createTable:
            tableName: ingredient_tags
            columns:
              - column:
                  name: ingredient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: ingredient_tags
            columnNames: ingredient_id, tag_id
            constraintName: pk_ingredient_tags

        - addForeignKeyConstraint:
            baseTableName: ingredient_tags
            baseColumnNames: ingredient_id
            referencedTableName: ingredients
            referencedColumnNames: id
            constraintName: fk_ingredient_tags_ingredient
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: ingredient_tags
            baseColumnNames: tag_id
            referencedTableName: ing_tags
            referencedColumnNames: id
            constraintName: fk_ingredient_tags_tag
            onDelete: CASCADE

        - createIndex:
            tableName: ingredient_tags
            indexName: idx_ingredient_tags_ingredient_id
            columns:
              - column:
                  name: ingredient_id

        - createIndex:
            tableName: ingredient_tags
            indexName: idx_ingredient_tags_tag_id
            columns:
              - column:
                  name: tag_id

      rollback:
        - dropTable:
            tableName: ingredient_tags


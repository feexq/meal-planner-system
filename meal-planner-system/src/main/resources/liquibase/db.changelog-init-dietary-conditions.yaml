databaseChangeLog:
  - changeSet:
      id: create-dietary-conditions-table
      author: feex
      changes:
        - createTable:
            tableName: dietary_conditions
            columns:
              - column:
                  name: id
                  type: VARCHAR(50)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

        - createTable:
            tableName: ingredient_dietary_tags
            columns:
              - column:
                  name: ingredient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: condition_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: ingredient_dietary_tags
            columnNames: ingredient_id, condition_id
            constraintName: pk_ingredient_dietary_tags

        - addForeignKeyConstraint:
            baseTableName: ingredient_dietary_tags
            baseColumnNames: ingredient_id
            referencedTableName: ingredients
            referencedColumnNames: id
            constraintName: fk_dietary_tag_ingredient
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: ingredient_dietary_tags
            baseColumnNames: condition_id
            referencedTableName: dietary_conditions
            referencedColumnNames: id
            constraintName: fk_dietary_tag_condition
            onDelete: CASCADE

        - createIndex:
            tableName: ingredient_dietary_tags
            indexName: idx_dietary_tags_ingredient_id
            columns:
              - column:
                  name: ingredient_id

      rollback:
        - dropTable:
            tableName: ingredient_dietary_tags
        - dropTable:
            tableName: dietary_conditions
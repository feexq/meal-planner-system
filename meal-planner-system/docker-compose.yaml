services:
  postgres:
    image: postgres:15
    container_name: meal_planner_db_test
    environment:
      POSTGRES_DB: meal_planner_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init/init.sql.gz:/docker-entrypoint-initdb.d/init.sql.gz

  redis:
    image: redis:7-alpine
    container_name: meal_planner_redis_test
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  normalizer:
    build:
      context: ./normalizer
      dockerfile: Dockerfile
    container_name: meal_planner_normalizer_test
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}

  stripe-webhook:
    image: stripe/stripe-cli
    container_name: meal_planner_stripe_test
    command: listen --forward-to http://backend:8080/api/webhooks/stripe
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - postgres
      - redis

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meal_planner_backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - NORMALIZER_URL=http://normalizer:8000
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      normalizer:
        condition: service_started
      stripe-webhook:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
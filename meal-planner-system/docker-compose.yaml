services:
  postgres:
    image: postgres:15
    container_name: meal_planner_db
    environment:
      POSTGRES_DB: meal_planner_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: meal_planner_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  normalizer:
    build:
      context: ./normalizer
      dockerfile: Dockerfile
    container_name: meal_planner_normalizer
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}

volumes:
  postgres_data:
  redis_data: